<!doctype html>
<html lang="en">
<meta charset="utf-8" />
<title>OBS Overlay</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet" />
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body { background: transparent; overflow: hidden; }

    #hr-widget {
        display: inline-flex;
        flex-direction: column;
        gap: 10px;
        padding: 12px 16px 10px;
        background: rgba(0, 0, 0, 0.55);
        border-radius: 16px;
        backdrop-filter: blur(6px);
        margin: 16px;
        opacity: 0;
        transition: opacity 0.5s, filter 0.8s;
    }
    #hr-widget.visible { opacity: 1; }
    #hr-widget.stale {
        filter: grayscale(1) brightness(0.45);
    }
    #hr-widget.stale #hr-icon {
        animation-play-state: paused;
    }

    .hr-top {
        display: flex;
        align-items: center;
        gap: 12px;
    }

    #hr-icon {
        font-size: 34px;
        line-height: 1;
        display: block;
        transform-origin: center;
        animation: heartbeat 0.8s ease-in-out infinite;
    }

    @keyframes heartbeat {
        0%,  100% { transform: scale(1);    }
        15%        { transform: scale(1.45); }
        35%        { transform: scale(1.05); }
    }

    #hr-value {
        font-family: "Orbitron", monospace;
        font-size: 38px;
        font-weight: 700;
        color: #fff;
        line-height: 1;
        min-width: 3ch;
        transition: text-shadow 0.6s;
    }

    #hr-chart {
        width: 220px;
        height: 38px;
        display: block;
        overflow: visible;
    }
</style>

<div id="hr-widget">
    <div class="hr-top">
        <span id="hr-icon">🩵</span>
        <span id="hr-value">—</span>
    </div>
    <svg id="hr-chart" viewBox="0 0 220 38" preserveAspectRatio="none">
        <defs>
            <linearGradient id="fillGrad" x1="0" y1="0" x2="0" y2="1">
                <stop id="grad-top" offset="0%"   stop-color="#44dd88" stop-opacity="0.28"/>
                <stop             offset="100%" stop-color="#44dd88" stop-opacity="0"/>
            </linearGradient>
        </defs>
        <polygon  id="hr-fill" fill="url(#fillGrad)" stroke="none" points=""/>
        <polyline id="hr-line" fill="none" stroke="#44dd88" stroke-width="1.5"
                  stroke-linejoin="round" stroke-linecap="round" points=""/>
        <circle   id="hr-dot"  r="2.5" fill="#44dd88" cx="-10" cy="0"/>
    </svg>
</div>

<script>
(function () {
    const widget = document.getElementById('hr-widget');
    const valEl  = document.getElementById('hr-value');
    const icon   = document.getElementById('hr-icon');
    const line   = document.getElementById('hr-line');
    const fillEl = document.getElementById('hr-fill');
    const dot    = document.getElementById('hr-dot');
    const gradTop = document.getElementById('grad-top');

    const MAX = 30;
    const W = 220, H = 38;
    const STEP = W / (MAX - 1);
    const history = [];
    const STALE_MS = 5000;
    let staleTimer = null;

    // ── colour zones ──────────────────────────────────────
    // ≤100 green, 100–125 yellow, ≥125 red
    function hrColor(bpm) {
        if (bpm >= 125) return '#ff4444';
        if (bpm >= 100) return '#ffcc00';
        return '#44dd88';
    }

    function applyColor(color) {
        line.setAttribute('stroke', color);
        dot.setAttribute('fill', color);
        gradTop.setAttribute('stop-color', color);
        valEl.style.textShadow = `0 0 18px ${color}88`;
    }

    // ── chart ─────────────────────────────────────────────
    function updateChart() {
        const n = history.length;
        if (n < 2) return;

        const lo   = Math.min(...history);
        const hi   = Math.max(...history);
        const span = hi - lo || 1;
        const startX = W - (n - 1) * STEP;

        const pts = history.map((v, i) => {
            const x = startX + i * STEP;
            const y = H - ((v - lo) / span) * (H - 4) - 2;
            return [x, y];
        });

        const polyStr = pts.map(([x, y]) => `${x.toFixed(1)},${y.toFixed(1)}`).join(' ');
        line.setAttribute('points', polyStr);

        const [lx, ly] = pts[pts.length - 1];
        dot.setAttribute('cx', lx.toFixed(1));
        dot.setAttribute('cy', ly.toFixed(1));

        fillEl.setAttribute('points',
            polyStr + ` ${lx.toFixed(1)},${H} ${pts[0][0].toFixed(1)},${H}`);
    }

    // ── update ────────────────────────────────────────────
    function onHeartRate(bpm) {
        valEl.textContent = bpm;
        widget.classList.add('visible');
        widget.classList.remove('stale');
        icon.style.animationDuration = (60 / bpm).toFixed(3) + 's';

        clearTimeout(staleTimer);
        staleTimer = setTimeout(() => widget.classList.add('stale'), STALE_MS);
        applyColor(hrColor(bpm));

        history.push(bpm);
        if (history.length > MAX) history.shift();
        updateChart();
    }

    // ── WebSocket ─────────────────────────────────────────
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const WS_URL = `${proto}//${location.host}/obs`;

    function connect() {
        const ws = new WebSocket(WS_URL);
        ws.onmessage = ({ data }) => {
            try {
                const msg = JSON.parse(data);
                if (typeof msg.heartrate === 'number') onHeartRate(msg.heartrate);
            } catch {}
        };
        ws.onclose = () => setTimeout(connect, 3000);
        ws.onerror = () => ws.close();
    }

    connect();
})();
</script>
</html>
