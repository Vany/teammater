<!doctype html>
<html>
    <head>
        <meta charset="UTF-8" />
        <title>Teammater</title>
        <link rel="stylesheet" href="index.css" />
    </head>
    <body>
        <div class="main-content">
            <h1>Twitch Chat</h1>
            <div id="output"></div>
        </div>

        <div class="control-panel">
            <audio id="myAudio" src="mp3/boo.mp3" preload="auto"></audio>

            <!-- Module Container (new modular system) -->
            <div id="modules-container" class="modules-container"></div>

            <a href="/neco.html?t=100" target="_blank">1M</a>
            <a href="/neco.html?t=300" target="_blank">5M</a>
            <a href="/neco.html?t=600" target="_blank">10M</a>
            <a href="/obs.html" target="_blank" align="right">OBS</a>
            <hr />
            <button
                class="test-button"
                onclick="voice()({}, 'testuser', 'Test passed')"
            >
                TEST
            </button>
            <a href="https://www.twitch.tv/vanyserezhkin" target="_blank"
                >https://www.twitch.tv/vanyserezhkin</a
            >
            <input
                type="text"
                id="announce-input"
                stored_as="announce"
                style="width: 90%"
            />

            <div class="control-section">
                <label class="checkbox-label">
                    <input
                        type="checkbox"
                        stored_as="loud"
                        stored_default="true"
                        id="loudCheckbox"
                    />
                    🌸 loud
                </label>
            </div>
        </div>

        <script>
            (() => {
                const HISTORY_KEY = "announce_history";
                const MAX_HISTORY = 200;
                let historyIndex = null; // null = not browsing
                let draft = "";

                function getHistory() {
                    try {
                        return (
                            JSON.parse(localStorage.getItem(HISTORY_KEY)) || []
                        );
                    } catch {
                        return [];
                    }
                }
                function saveHistory(h) {
                    localStorage.setItem(HISTORY_KEY, JSON.stringify(h));
                }
                function pushHistory(value) {
                    const h = getHistory();
                    if (value && h[h.length - 1] !== value) {
                        h.push(value);
                        if (h.length > MAX_HISTORY)
                            h.splice(0, h.length - MAX_HISTORY);
                        saveHistory(h);
                    }
                }

                // ── Announce timer ────────────────────────────────────────
                // Started on stream:online. Cancelled by sending announce.
                // On expire: play startup.mp3 + red border.
                const ANNOUNCE_TIMER_MS = 10 * 60 * 1000;
                let announceTimer = null;
                const startupAudio = new Audio("mp3/startup.mp3");

                function clearAnnounceTimer(input) {
                    if (!announceTimer) return;
                    clearTimeout(announceTimer);
                    announceTimer = null;
                    input.style.borderColor = "";
                    console.log("[announce-timer] cancelled");
                }

                function startAnnounceTimer(input) {
                    clearAnnounceTimer(input);
                    console.log("[announce-timer] started (10 min)");
                    announceTimer = setTimeout(() => {
                        announceTimer = null;
                        input.style.borderColor = "red";
                        startupAudio.currentTime = 0;
                        startupAudio.play().catch(() => {});
                        console.log("[announce-timer] expired — border red, playing startup.mp3");
                    }, ANNOUNCE_TIMER_MS);
                }

                document.addEventListener("stream:online", () => {
                    const input = document.getElementById("announce-input");
                    if (input) startAnnounceTimer(input);
                });
                // ─────────────────────────────────────────────────────────

                document.addEventListener("DOMContentLoaded", () => {
                    const input = document.getElementById("announce-input");
                    if (!input) return;

                    input.addEventListener("keydown", async (e) => {
                        const h = getHistory();

                        if (e.key === "ArrowUp") {
                            e.preventDefault();
                            if (h.length === 0) return;
                            if (historyIndex === null) {
                                draft = input.value;
                                historyIndex = h.length - 1;
                            } else if (historyIndex > 0) {
                                historyIndex--;
                            }
                            input.value = h[historyIndex];
                        } else if (e.key === "ArrowDown") {
                            e.preventDefault();
                            if (historyIndex === null) return;
                            if (historyIndex < h.length - 1) {
                                historyIndex++;
                                input.value = h[historyIndex];
                            } else {
                                historyIndex = null;
                                input.value = draft;
                            }
                        } else if (e.key === "Enter") {
                            const value = input.value.trim();
                            if (!value) return;
                            pushHistory(value);
                            historyIndex = null;
                            draft = "";
                            clearAnnounceTimer(input);
                            eval(localStorage.getItem("ANNOUNCE"));
                            console.log(await ANNOUNCE(value));
                        } else {
                            // Any other key resets history browsing
                            historyIndex = null;
                        }
                    });
                });
            })();
        </script>
        <script type="module" src="index.js"></script>
    </body>
</html>
